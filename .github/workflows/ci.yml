name: CI

on:
  push:
    branches: [main]
    paths:
      - "clients/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.*"
      - ".prettierrc.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "clients/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.*"
      - ".prettierrc.json"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Init submodules
        env:
          CAMERA_UI_TOKEN: ${{ secrets.CAMERA_UI_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${CAMERA_UI_TOKEN}@github.com/".insteadOf "https://github.com/"
          if ! GIT_TERMINAL_PROMPT=0 git ls-remote https://github.com/seydx/camera.ui3.git HEAD >/dev/null 2>&1; then
            echo "::error::Token cannot access seydx/camera.ui3"
            exit 1
          fi
          git submodule update --init --depth 1 externals/camera.ui
          git config --global --unset url."https://x-access-token:${CAMERA_UI_TOKEN}@github.com/".insteadOf || true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - run: npm ci
      - name: Build (externals → logger → transport → browser)
        run: npm run build
      - run: npm run lint
      - run: npm test

  transport-only:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - name: Build externals + logger + transport
        run: |
          npm run build:externals
          npm run build -w @camera.ui/logger
          npm run build -w @camera.ui/transport
      - run: npm run lint -w @camera.ui/transport
      - run: npm run test -w @camera.ui/transport --if-present
